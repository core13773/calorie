name: Build & deploy

# Build the static site from Supabase and deploy to GitHub Pages.
# Monthly cron + manual runs also re-run the USDA ETL first so new foods appear.
# (식약처 data is loaded locally via etl/mfds.py; it persists in Supabase, so the
# CI build picks it up without needing the XLSX.)
on:
  schedule:
    - cron: '23 3 1 * *' # ~03:23 UTC, 1st of each month
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Refresh USDA data (monthly / manual only — skip on plain code pushes)
        if: github.event_name != 'push'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run etl:usda

      - name: Build (static pages from Supabase)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLIC_ADSENSE_CLIENT: ${{ secrets.PUBLIC_ADSENSE_CLIENT }}
          PUBLIC_GA4_ID: ${{ secrets.PUBLIC_GA4_ID }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
