name: Refresh data & deploy

# Build the site and deploy to Cloudflare Pages via direct upload (wrangler).
# Monthly cron + manual runs also re-run the ETL first so new foods appear.
on:
  schedule:
    - cron: '23 3 1 * *' # ~03:23 UTC, 1st of each month
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Refresh USDA data (monthly / manual only — skip on plain code pushes)
        if: github.event_name != 'push'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run etl:usda

      - name: Build (static pages from Supabase)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@latest pages deploy dist --project-name=calorie-monster --branch=main --commit-dirty=true
