<!doctype html>
<html lang="ko">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#16a34a" />

<title>오프라인 · calorie.monster</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<style>
  :root { --primary-dark:#15803d; --text:#15201c; --muted:#6b7670; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background:#f7f9f8; color:var(--text); display:grid; place-items:center; min-height:100vh; text-align:center; padding:1.5rem; }
  .box { max-width: 420px; }
  .emoji { font-size: 3rem; }
  h1 { font-size: 1.4rem; margin: .5rem 0; }
  p { color: var(--muted); line-height: 1.6; }
  a { display:inline-block; margin-top:1rem; padding:.7rem 1.2rem; background:var(--primary-dark); color:#fff; border-radius:11px; font-weight:600; text-decoration:none; }
</style>
</head>
<body>
  <div class="box">
    <div class="emoji">📴</div>
    <h1>오프라인 상태입니다 / You're offline</h1>
    <p>인터넷 연결이 끊겼습니다. 최근에 방문한 식품 페이지는 오프라인에서도 볼 수 있어요.<br>No connection. Recently visited food pages remain available offline.</p>
    <a href="/">🔄 다시 시도 / Retry</a>
  </div>
</body>
</html>
